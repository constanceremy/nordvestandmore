name: Instagram Drip Scraper

on:
  schedule:
    # Every 30 minutes — with 5 accounts per run, covers all ~144
    # accounts in ~14 hours.  A cursor tracks position
    # so each run picks up where the last one left off.
    # Runs on self-hosted Mac runner → residential IP → no IG rate limits.
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      batch_size:
        description: "Number of accounts to scrape (default: 5)"
        type: number
        default: 5
      accounts:
        description: "Specific accounts to scrape (space-separated, overrides cursor)"
        type: string
        default: ""

concurrency:
  # Only one drip run at a time. If a new run is queued while one is in progress,
  # cancel the in-progress one so we don't pile up stale batches after a Mac sleep.
  group: ig-drip
  cancel-in-progress: true

jobs:
  drip:
    runs-on: self-hosted
    timeout-minutes: 25

    env:
      # State file persists on the Mac between runs (no need for Actions cache)
      IG_STATE_FILE: /tmp/ig_cursor/state.json

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Python dependencies
        run: |
          cd nordvestandmore
          if [ -d venv ]; then
            source venv/bin/activate
          fi
          pip install -r requirements.txt

      # ── Ensure IG session is available ──
      - name: Restore IG session
        env:
          IG_USERNAME: ${{ secrets.IG_USERNAME }}
          IG_SESSION_B64: ${{ secrets.IG_SESSION_B64 }}
        run: |
          # GitHub Actions may override HOME, so ensure session is in the right place
          REAL_HOME=$(eval echo ~)
          SESSION_DIR="$REAL_HOME/.config/instaloader"
          SESSION_FILE="$SESSION_DIR/session-${IG_USERNAME}"
          if [ -n "$IG_SESSION_B64" ]; then
            echo "📸 Restoring session from secret (always overwrite to pick up refreshed cookies)"
            mkdir -p "$SESSION_DIR"
            echo "$IG_SESSION_B64" | base64 -d > "$SESSION_FILE"
          elif [ -f "$SESSION_FILE" ]; then
            echo "📸 No secret found — using existing session file at $SESSION_FILE"
          else
            echo "📸 No session file or secret found — will scrape without login"
          fi

      # ── Run the drip scraper ──
      - name: Scrape IG batch
        env:
          PYTHONUNBUFFERED: "1"
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          IG_USERNAME: ${{ secrets.IG_USERNAME }}
          IG_PASSWORD: ${{ secrets.IG_PASSWORD }}
          GOOGLE_SHEET_CSV_URL: ${{ secrets.GOOGLE_SHEET_CSV_URL }}
        working-directory: nordvestandmore/ig_scraper
        run: |
          # Activate venv if it exists
          if [ -f ../venv/bin/activate ]; then
            source ../venv/bin/activate
          fi

          if [ -n "${{ inputs.accounts }}" ]; then
            echo "📸 Manual mode: scraping specific accounts"
            python3 scrape_instagram_events.py ${{ inputs.accounts }}
          else
            BATCH_SIZE="${{ inputs.batch_size || '5' }}"
            python3 drip_scrape.py --batch-size "$BATCH_SIZE"
          fi

      # ── Failure notification ──
      - name: Notify on failure
        if: failure() || cancelled()
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          if [ -n "$NTFY_TOPIC" ]; then
            curl -s \
              -H "Title: IG Drip Scraper Failed" \
              -H "Priority: high" \
              -H "Tags: warning" \
              -d "Instagram drip scraper failed or was cancelled. Check GitHub Actions." \
              "https://ntfy.sh/$NTFY_TOPIC" || true
          fi

  # ── Daily digest: runs once per day, summarizes failures ──
  daily-report:
    runs-on: self-hosted
    timeout-minutes: 5
    if: github.event.schedule == '0 * * * *'
    needs: drip

    env:
      IG_STATE_FILE: /tmp/ig_cursor/state.json

    steps:
      - name: Check if it's report time
        id: check
        run: |
          HOUR=$(date -u +%H)
          # Run the daily report at the 06:00 UTC slot (~7-8 AM Copenhagen)
          if [ "$HOUR" = "06" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "⏭️ Not report time (${HOUR} UTC), skipping"
          fi

      - name: Checkout code
        if: steps.check.outputs.run == 'true'
        uses: actions/checkout@v4

      - name: Generate daily report
        if: steps.check.outputs.run == 'true'
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        working-directory: nordvestandmore/ig_scraper
        run: |
          if [ -f ../venv/bin/activate ]; then
            source ../venv/bin/activate
          fi
          python3 drip_scrape.py --daily-report
