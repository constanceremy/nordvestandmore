name: Instagram Drip Scraper

on:
  schedule:
    # Every 30 minutes — with 3 accounts per run, covers all ~150
    # accounts in ~25 hours.  A cursor tracks position so each
    # run picks up where the last one left off.
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      batch_size:
        description: "Number of accounts to scrape (default: 3)"
        type: number
        default: 3
      accounts:
        description: "Specific accounts to scrape (space-separated, overrides cursor)"
        type: string
        default: ""

jobs:
  drip:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: nordvestandmore/requirements.txt

      - name: Install Python dependencies
        run: pip install -r nordvestandmore/requirements.txt

      # ── Restore state (cursor + accumulated failures) ──
      - name: Restore state
        uses: actions/cache/restore@v4
        with:
          path: /tmp/ig_cursor
          key: ig-state-never-matches
          restore-keys: ig-state-

      # ── Restore Instaloader session (avoids re-login each run) ──
      - name: Restore IG session
        uses: actions/cache/restore@v4
        with:
          path: ~/.config/instaloader/
          key: ig-session-never-matches
          restore-keys: ig-session-

      # ── Run the drip scraper ──
      - name: Scrape IG batch
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          IG_USERNAME: ${{ secrets.IG_USERNAME }}
          IG_PASSWORD: ${{ secrets.IG_PASSWORD }}
          IG_STATE_FILE: /tmp/ig_cursor/state.json
        working-directory: nordvestandmore/ig_scraper
        run: |
          if [ -n "${{ inputs.accounts }}" ]; then
            echo "📸 Manual mode: scraping specific accounts"
            python3 scrape_instagram_events.py ${{ inputs.accounts }}
          else
            BATCH_SIZE="${{ inputs.batch_size || '3' }}"
            python3 drip_scrape.py --batch-size "$BATCH_SIZE"
          fi

      # ── Save state for next run ──
      - name: Save state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: /tmp/ig_cursor
          key: ig-state-${{ github.run_id }}

      # ── Save IG session for next run ──
      - name: Save IG session
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ~/.config/instaloader/
          key: ig-session-${{ github.run_id }}

  # ── Daily digest: runs once per day, summarizes failures ──
  daily-report:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Only run at the 06:00 UTC slot (first cron hit after 06:00)
    if: github.event.schedule == '*/30 * * * *'
    needs: drip

    steps:
      - name: Check if it's report time
        id: check
        run: |
          HOUR=$(date -u +%H)
          MINUTE=$(date -u +%M)
          # Run the daily report between 06:00-06:29 UTC (~7-8 AM Copenhagen)
          if [ "$HOUR" = "06" ] && [ "$MINUTE" -lt "30" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "⏭️ Not report time (${HOUR}:${MINUTE} UTC), skipping"
          fi

      - name: Checkout code
        if: steps.check.outputs.run == 'true'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.check.outputs.run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: nordvestandmore/requirements.txt

      - name: Install Python dependencies
        if: steps.check.outputs.run == 'true'
        run: pip install -r nordvestandmore/requirements.txt

      - name: Restore state
        if: steps.check.outputs.run == 'true'
        uses: actions/cache/restore@v4
        with:
          path: /tmp/ig_cursor
          key: ig-state-never-matches
          restore-keys: ig-state-

      - name: Generate daily report
        if: steps.check.outputs.run == 'true'
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          IG_STATE_FILE: /tmp/ig_cursor/state.json
        working-directory: nordvestandmore/ig_scraper
        run: python3 drip_scrape.py --daily-report

      - name: Save state (with reset counters)
        if: steps.check.outputs.run == 'true'
        uses: actions/cache/save@v4
        with:
          path: /tmp/ig_cursor
          key: ig-state-report-${{ github.run_id }}
