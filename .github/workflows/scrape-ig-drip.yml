name: Instagram Drip Scraper

on:
  schedule:
    # Every 6 hours (00/06/12/18 UTC). Reduced from */30 to back off after IG
    # started throttling the session in May 2026. Daily-report job runs at 06 UTC.
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      batch_size:
        description: "Number of accounts to scrape (default: 5)"
        type: number
        default: 5
      accounts:
        description: "Specific accounts to scrape (space-separated, overrides cursor)"
        type: string
        default: ""
      days_back:
        description: "How many days back to look for posts (default: 20 for manual runs, 7 for scheduled)"
        type: number
        default: 20
      force_refresh_session:
        description: "Force restore session from IG_SESSION_B64 secret (use after updating the secret)"
        type: boolean
        default: false

concurrency:
  group: ig-drip
  cancel-in-progress: true

jobs:
  drip:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      IG_STATE_FILE: /tmp/ig_cursor/state.json

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Restore state + session cache
        uses: actions/cache/restore@v4
        with:
          path: |
            /tmp/ig_cursor
            ~/.config/instaloader
          key: ig-drip-state-${{ github.run_id }}
          restore-keys: ig-drip-state-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          cd nordvestandmore/scraper
          pip install -r requirements.txt

      # ── Ensure IG session is available ──
      - name: Restore IG session
        env:
          IG_USERNAME: ${{ secrets.IG_USERNAME }}
          IG_SESSION_B64: ${{ secrets.IG_SESSION_B64 }}
        run: |
          SESSION_DIR="$HOME/.config/instaloader"
          SESSION_FILE="$SESSION_DIR/session-${IG_USERNAME}"
          FORCE="${{ inputs.force_refresh_session }}"
          if [ "$FORCE" = "true" ] && [ -n "$IG_SESSION_B64" ]; then
            echo "📸 Force-refreshing session from secret"
            mkdir -p "$SESSION_DIR"
            echo "$IG_SESSION_B64" | base64 -d > "$SESSION_FILE"
          elif [ -f "$SESSION_FILE" ]; then
            echo "📸 Using cached session file"
          elif [ -n "$IG_SESSION_B64" ]; then
            echo "📸 No cached session — restoring from secret"
            mkdir -p "$SESSION_DIR"
            echo "$IG_SESSION_B64" | base64 -d > "$SESSION_FILE"
          else
            echo "📸 No session file or secret found — will scrape without login"
          fi

      # ── Run the drip scraper ──
      - name: Scrape IG batch
        env:
          PYTHONUNBUFFERED: "1"
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          NOTION_LOCATIONS_DB_ID: ${{ secrets.NOTION_LOCATIONS_DB_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          IG_USERNAME: ${{ secrets.IG_USERNAME }}
          IG_PASSWORD: ${{ secrets.IG_PASSWORD }}
          IG_PROXY_URL: ${{ secrets.IG_PROXY_URL }}
          GOOGLE_SHEET_CSV_URL: ${{ secrets.GOOGLE_SHEET_CSV_URL }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        working-directory: nordvestandmore/scraper/ig_scraper
        run: |
          if [ -n "${{ inputs.accounts }}" ]; then
            echo "📸 Manual mode: scraping specific accounts"
            DAYS_BACK="${{ inputs.days_back || '20' }}" python3 scrape_instagram_events.py ${{ inputs.accounts }}
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            BATCH_SIZE="${{ inputs.batch_size || '3' }}"
            if [ "${{ inputs.force_refresh_session }}" = "true" ]; then
              python3 -c "import json,pathlib; f=pathlib.Path('$IG_STATE_FILE'); d=json.loads(f.read_text()) if f.exists() else {}; d.update({'suspended':False,'auth_failure_streak':0,'suspended_until':None}); f.parent.mkdir(parents=True,exist_ok=True); f.write_text(json.dumps(d,indent=2)); print('🔓 Scraper unsuspended')"
            fi
            python3 drip_scrape.py --batch-size "$BATCH_SIZE" --force
          else
            python3 drip_scrape.py --batch-size 3
          fi

      - name: Save state + session cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            /tmp/ig_cursor
            ~/.config/instaloader
          key: ig-drip-state-${{ github.run_id }}

      # ── Failure notification ──
      - name: Notify on failure
        if: failure()
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          if [ -n "$NTFY_TOPIC" ]; then
            curl -s \
              -H "Title: IG Drip Scraper Failed" \
              -H "Priority: high" \
              -H "Tags: warning" \
              -d "Instagram drip scraper failed or was cancelled. Check GitHub Actions." \
              "https://ntfy.sh/$NTFY_TOPIC" || true
          fi

  # ── Daily digest + tracker: runs once per day at 06:00 UTC ──
  daily-report:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event.schedule == '0 */6 * * *'
    needs: drip

    env:
      IG_STATE_FILE: /tmp/ig_cursor/state.json

    steps:
      - name: Check if it's report time
        id: check
        run: |
          HOUR=$(date -u +%H)
          if [ "$HOUR" = "06" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "⏭️ Not report time (${HOUR} UTC), skipping"
          fi

      - name: Checkout code
        if: steps.check.outputs.run == 'true'
        uses: actions/checkout@v4

      - name: Restore state cache
        if: steps.check.outputs.run == 'true'
        uses: actions/cache/restore@v4
        with:
          path: /tmp/ig_cursor
          key: ig-drip-state-${{ github.run_id }}
          restore-keys: ig-drip-state-

      - name: Set up Python
        if: steps.check.outputs.run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        if: steps.check.outputs.run == 'true'
        run: |
          cd nordvestandmore/scraper
          pip install -r requirements.txt

      - name: Generate daily report + tracker
        if: steps.check.outputs.run == 'true'
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        working-directory: nordvestandmore/scraper/ig_scraper
        run: |
          python3 drip_scrape.py --daily-report
          python3 drip_scrape.py --export-tracker ../scrape_tracker.md

      - name: Commit tracker
        if: steps.check.outputs.run == 'true'
        run: |
          cd nordvestandmore/scraper
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scrape_tracker.md
          if git diff --cached --quiet; then
            echo "No tracker changes to commit"
          else
            git commit -m "chore: update scrape tracker [skip ci]"
            git push
          fi
