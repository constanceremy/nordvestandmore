name: Scrape Events

on:
  schedule:
    # Runs daily at 19:30 UTC = ~9:30 PM Copenhagen (summer) / ~8:30 PM (winter)
    - cron: "30 19 * * *"
  workflow_dispatch:
    inputs:
      sources:
        description: "Specific source(s) to scrape — space-separated names from the sheet (partial match ok). Leave empty to scrape all."
        type: string
        default: ""

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 120  # 2-hour max (scraping can be slow)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: nordvestandmore/requirements.txt

      - name: Install Python dependencies
        run: pip install -r nordvestandmore/requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Restore Facebook cookies
        if: env.FB_COOKIES_B64 != ''
        env:
          FB_COOKIES_B64: ${{ secrets.FB_COOKIES_B64 }}
        run: echo "$FB_COOKIES_B64" | base64 -d > nordvestandmore/fb_scraper/fb_cookies.json

      - name: Run scraper
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          IG_USERNAME: ${{ secrets.IG_USERNAME }}
          IG_PASSWORD: ${{ secrets.IG_PASSWORD }}
          SKIP_IG: "1"  # IG handled by drip-feed workflow (scrape-ig-drip.yml)
          DEBUG: "1"
        working-directory: nordvestandmore
        run: |
          if [ -n "${{ inputs.sources }}" ]; then
            echo "🎯 Manual mode: scraping specific source(s): ${{ inputs.sources }}"
            python3 run_scraper.py ${{ inputs.sources }}
          else
            python3 run_scraper.py all --auto
          fi

      - name: Revalidate website cache
        if: success()
        env:
          REVALIDATE_SECRET: ${{ secrets.REVALIDATE_SECRET }}
        run: |
          if [ -n "$REVALIDATE_SECRET" ]; then
            curl -s -X POST \
              -H "x-revalidate-secret: $REVALIDATE_SECRET" \
              "https://nordvestandmore.vercel.app/api/revalidate" \
              && echo "✅ Website cache revalidated" \
              || echo "⚠️ Revalidation request failed (non-blocking)"
          fi

      - name: Post run summary
        if: always()
        run: |
          if [ -f nordvestandmore/scraper_summary.md ]; then
            cat nordvestandmore/scraper_summary.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "⚠️ No scraper summary file found (scraper may have crashed before finishing)" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload log on failure
        if: failure() || cancelled()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-log-${{ github.run_id }}
          path: |
            nordvestandmore/logs/
            nordvestandmore/scraper_summary.md
          retention-days: 14

      - name: Send failure notification
        if: failure() || cancelled()
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          if [ -n "$NTFY_TOPIC" ]; then
            STATUS="${{ job.status }}"
            curl -s \
              -H "Title: NV&More Scraper ${STATUS}" \
              -H "Priority: high" \
              -H "Tags: warning" \
              -d "The daily event scraper ${STATUS}. Check GitHub Actions for details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
              "https://ntfy.sh/$NTFY_TOPIC"
          fi
